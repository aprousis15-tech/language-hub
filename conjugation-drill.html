<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Verb Conjugation Drill — -αω, -εω, -ω, -ώ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean: #1a5f7a;
    --sky: #2e86ab;
    --sand: #f4e9d8;
    --white: #fdfaf6;
    --dark: #1e2a35;
    --tile: #e8dcc8;
    --greek-blue: #0d4f8b;
    --teal: #00695c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--white);
    color: var(--dark);
    min-height: 100vh;
    padding: 24px 16px 64px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  header.top {
    text-align: center;
    margin-bottom: 24px;
  }
  header.top h1 {
    font-family: 'Playfair Display', serif;
    color: var(--greek-blue);
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    margin-bottom: 6px;
  }
  header.top p {
    color: #4a6f8a;
    font-size: 0.95rem;
  }
  .group-filter {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 18px;
  }
  .group-btn {
    padding: 7px 16px; border-radius: 99px; border: 1.5px solid #bbdefb;
    background: white; color: var(--greek-blue); font-size: 0.85rem;
    cursor: pointer; font-family: 'Lato', sans-serif; font-weight: 600;
  }
  .group-btn:hover { background: #e3f2fd; }
  .group-btn.active { background: var(--greek-blue); color: white; border-color: var(--greek-blue); }
  .stats {
    text-align: center; font-size: 0.88rem; color: #4a6f8a;
    margin-bottom: 18px; display: flex; justify-content: center; gap: 18px; flex-wrap: wrap;
  }
  .stats strong { color: #0d47a1; font-size: 1.05rem; }
  .stats .correct-stat strong { color: #2e7d32; }
  .stats .wrong-stat strong { color: #c62828; }
  .card {
    max-width: 520px; margin: 0 auto; background: white;
    border-radius: 14px; padding: 28px 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    border: 1px solid #e1ecf4; text-align: center;
  }
  .verb-meta {
    font-size: 0.78rem; color: #888; letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .verb-meta .group-pill {
    display: inline-block; background: #e3f2fd; color: var(--greek-blue);
    padding: 2px 10px; border-radius: 99px; font-weight: 700;
    margin-right: 6px;
  }
  .infinitive {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; color: #555; margin-bottom: 4px;
  }
  .infinitive-en {
    font-size: 0.92rem; color: #888; font-style: italic;
    margin-bottom: 18px;
  }
  .prompt-pron {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; color: var(--teal); font-weight: 600;
    line-height: 1.2; min-height: 44px;
  }
  .prompt-en {
    font-size: 0.95rem; color: #5a6f6c; font-style: italic;
    margin: 4px 0 18px;
  }
  .input {
    width: 100%; max-width: 360px; padding: 12px 16px;
    font-size: 1.4rem;
    font-family: 'Georgia', serif;
    border: 2px solid #bbdefb; border-radius: 8px;
    text-align: center; box-sizing: border-box;
    color: var(--teal);
  }
  .input:focus { outline: none; border-color: var(--greek-blue); }
  .input.correct { border-color: #2e7d32; background: #e8f5e9; }
  .input.wrong { border-color: #c62828; background: #ffebee; }
  .actions {
    display: flex; gap: 8px; justify-content: center;
    margin-top: 14px; flex-wrap: wrap;
  }
  .btn {
    padding: 9px 20px; border-radius: 99px;
    font-family: 'Lato', sans-serif; font-weight: 700;
    font-size: 0.88rem; cursor: pointer;
    border: 1.5px solid var(--greek-blue);
  }
  .btn-primary { background: var(--greek-blue); color: white; }
  .btn-primary:hover { background: #0a3d6e; }
  .btn-secondary { background: white; color: var(--greek-blue); }
  .btn-secondary:hover { background: #e3f2fd; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .feedback {
    margin-top: 16px; padding: 12px 14px; border-radius: 8px;
    font-size: 0.95rem; text-align: left;
  }
  .feedback.ok { background: #e8f5e9; color: #1b5e20; border-left: 4px solid #2e7d32; }
  .feedback.no { background: #ffebee; color: #b71c1c; border-left: 4px solid #c62828; }
  .feedback .answer-line { font-family: 'Georgia', serif; font-size: 1.2rem; margin-top: 4px; }
  .feedback .note-line {
    margin-top: 10px; padding-top: 8px; border-top: 1px dashed currentColor;
    font-size: 0.92rem; opacity: 0.9; font-style: italic;
  }
  .feedback .note-line strong { font-style: normal; }
  .table-wrap {
    margin-top: 28px; max-width: 620px; margin-left: auto; margin-right: auto;
  }
  .table-toggle {
    display: block; width: 100%; padding: 10px;
    background: #fffbeb; border: 1.5px solid #ffe082; border-radius: 8px;
    color: #b76e00; font-weight: 700; cursor: pointer;
    font-family: 'Lato', sans-serif; font-size: 0.9rem;
  }
  .table-body { display: none; margin-top: 12px; }
  .table-body.open { display: block; }
  .group-block { margin-bottom: 22px; }
  .group-block h3 {
    font-family: 'Playfair Display', serif;
    color: #b76e00; margin-bottom: 6px;
    font-size: 1.1rem;
  }
  .group-block .group-rule {
    font-size: 0.85rem; color: #6a4f1a;
    background: #fff8e1; padding: 8px 12px; border-radius: 6px;
    border-left: 3px solid #ffb300;
    margin-bottom: 10px;
  }
  .conj-table {
    width: 100%; border-collapse: collapse;
    background: #fffdf4; border: 1px solid #ffe082; border-radius: 8px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .conj-table caption {
    background: #fff3c4; color: #b76e00; font-weight: 700;
    padding: 8px 10px; text-align: left;
  }
  .conj-table caption .meaning { font-weight: 400; opacity: 0.9; }
  .conj-table caption .verb-note {
    display: block; font-size: 0.78rem; font-weight: 400;
    color: #8c5a0a; margin-top: 3px; font-style: italic;
  }
  .conj-table th, .conj-table td {
    padding: 5px 12px; text-align: left; font-size: 0.92rem;
    border-bottom: 1px solid #fff3c4;
  }
  .conj-table th { color: #b76e00; font-weight: 700; width: 38%; }
  .conj-table td { font-family: 'Georgia', serif; color: var(--teal); }
  .empty-state {
    text-align: center; padding: 28px; color: #4a6f8a;
  }
  .rule-box {
    margin: 0 auto 18px; max-width: 620px;
    background: #f3e5f5; border-left: 4px solid #8e24aa;
    border-radius: 6px; padding: 12px 16px; font-size: 0.9rem;
    color: #4a148c;
  }
  .rule-box strong { color: #6a1b9a; }
  .footer-back {
    text-align: center; margin-top: 32px;
  }
  .footer-back a {
    color: var(--greek-blue); text-decoration: none;
    font-size: 0.9rem; font-weight: 600;
  }
  .footer-back a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Greek Verb Conjugation Drill</h1>
    <p>-αω · -εω · -ω · -ώ — type the form for each pronoun.</p>
  </header>

  <div class="group-filter" id="group-filter">
    <button class="group-btn active" data-group="all">All groups</button>
    <button class="group-btn" data-group="-αω">-αω (μιλάω)</button>
    <button class="group-btn" data-group="-εω">-εω (λέω family)</button>
    <button class="group-btn" data-group="-ω">-ω (αγοράζω)</button>
    <button class="group-btn" data-group="-ώ">-ώ (μπορώ)</button>
  </div>

  <div class="rule-box" id="rule-box">
    <strong>Endings cheat:</strong>
    <span id="rule-text">All four groups together. Pick a single group above to focus.</span>
  </div>

  <div class="stats">
    <span><strong id="stat-pos">1</strong> / <strong id="stat-total">0</strong></span>
    <span class="correct-stat">✓ <strong id="stat-correct">0</strong></span>
    <span class="wrong-stat">✗ <strong id="stat-wrong">0</strong></span>
    <span>streak <strong id="stat-streak">0</strong></span>
  </div>

  <div class="card" id="card">
    <div class="verb-meta">
      <span class="group-pill" id="meta-group">-αω</span>
      <span id="meta-label">verb</span>
    </div>
    <div class="infinitive" id="infinitive">…</div>
    <div class="infinitive-en" id="infinitive-en">…</div>
    <div class="prompt-pron" id="prompt-pron">…</div>
    <div class="prompt-en" id="prompt-en">…</div>
    <input type="text" class="input" id="input"
           lang="el" autocomplete="off" autocorrect="off"
           autocapitalize="off" spellcheck="false"
           placeholder="type the form…">
    <div class="actions">
      <button class="btn btn-primary" id="submit-btn">Check ✓</button>
      <button class="btn btn-secondary" id="skip-btn">Skip →</button>
      <button class="btn btn-secondary" id="reveal-btn">Reveal</button>
    </div>
    <div class="feedback" id="feedback" style="display:none;"></div>
  </div>

  <div class="empty-state" id="empty-state" style="display:none;">
    <h2>✓ Round complete</h2>
    <p>Click Restart to shuffle and go again.</p>
    <div style="margin-top: 16px;">
      <button class="btn btn-primary" id="restart-btn">Restart round</button>
    </div>
  </div>

  <div class="table-wrap">
    <button class="table-toggle" id="table-toggle">Show full conjugation tables ▾</button>
    <div class="table-body" id="table-body"></div>
  </div>

  <div class="footer-back">
    <a href="./index.html">← Back to Language Hub</a>
  </div>
</div>

<script>
  // The 6 pronoun prompts, in canonical order.
  const PRONOUNS = [
    { pron: 'εγώ',           en: 'I' },
    { pron: 'εσύ',           en: 'you (sing.)' },
    { pron: 'αυτός / αυτή',  en: 'he / she' },
    { pron: 'εμείς',         en: 'we' },
    { pron: 'εσείς',         en: 'you (pl./formal)' },
    { pron: 'αυτοί / αυτές', en: 'they' },
  ];

  // GROUPS holds one entry per conjugation pattern; each verb's `forms` array
  // is parallel to PRONOUNS (index 0 = εγώ, etc.).
  const GROUPS = [
    {
      group: '-αω',
      rule: '-αω group: endings -άω, -άς, -άει, -άμε, -άτε, -άνε · stress on the α throughout.',
      verbs: [
        { inf: 'μιλάω', en: 'to speak / to talk',
          note: "Gives English 'homily' (a sermon) via ὁμιλέω. Noun: η ομιλία (speech).",
          forms: ['μιλάω','μιλάς','μιλάει','μιλάμε','μιλάτε','μιλάνε'] },
        { inf: 'αγαπάω', en: 'to love',
          note: "Source of English 'agape' (selfless love). Noun: η αγάπη.",
          forms: ['αγαπάω','αγαπάς','αγαπάει','αγαπάμε','αγαπάτε','αγαπάνε'] },
        { inf: 'ρωτάω', en: 'to ask',
          note: "Noun: η ερώτηση (question). Mnemonic: 'ro-TA-o' — every ASK has an A.",
          forms: ['ρωτάω','ρωτάς','ρωτάει','ρωτάμε','ρωτάτε','ρωτάνε'] },
        { inf: 'περπατάω', en: 'to walk',
          note: "Gives English 'peripatetic' (Aristotle's walking philosophers).",
          forms: ['περπατάω','περπατάς','περπατάει','περπατάμε','περπατάτε','περπατάνε'] },
        { inf: 'πεινάω', en: 'to be hungry',
          note: "Noun: η πείνα (hunger). Mnemonic: 'I'm PINE-aw for food.'",
          forms: ['πεινάω','πεινάς','πεινάει','πεινάμε','πεινάτε','πεινάνε'] },
        { inf: 'διψάω', en: 'to be thirsty',
          note: "Noun: η δίψα (thirst). Paired opposite of πεινάω.",
          forms: ['διψάω','διψάς','διψάει','διψάμε','διψάτε','διψάνε'] },
        { inf: 'γελάω', en: 'to laugh',
          note: "Gives medical English 'gelastic' (relating to laughter). Noun: το γέλιο.",
          forms: ['γελάω','γελάς','γελάει','γελάμε','γελάτε','γελάνε'] },
        { inf: 'ξυπνάω', en: 'to wake up',
          note: "ξ- (out of) + ύπνος (sleep) = 'out of sleep'. Noun: ο ύπνος.",
          forms: ['ξυπνάω','ξυπνάς','ξυπνάει','ξυπνάμε','ξυπνάτε','ξυπνάνε'] },
        { inf: 'σταματάω', en: 'to stop',
          note: "Same root as 'stamp' (foot down = stop). 'Σταμάτα!' = 'Stop!'",
          forms: ['σταματάω','σταματάς','σταματάει','σταματάμε','σταματάτε','σταματάνε'] },
        { inf: 'βοηθάω', en: 'to help',
          note: "Noun: η βοήθεια (help / Boithia). 'Βοήθεια!' = 'Help!'",
          forms: ['βοηθάω','βοηθάς','βοηθάει','βοηθάμε','βοηθάτε','βοηθάνε'] },
      ]
    },
    {
      group: '-εω',
      rule: "λέω-family (vowel + ω): -ω, -ς, -ει, -με, -τε, -νε · εσύ drops the stem vowel (λες, πας, ακούς). Note: ακούω 3pl is ακούν (no -ε).",
      verbs: [
        { inf: 'λέω', en: 'to say / to tell / to call',
          note: "Source of 'lexicon', 'lexical' via λέξις (word). 3pl: λένε.",
          forms: ['λέω','λες','λέει','λέμε','λέτε','λένε'] },
        { inf: 'τρώω', en: 'to eat',
          note: "Stress on the ώ. Imperative: φάε (eat!) — irregular imperative.",
          forms: ['τρώω','τρως','τρώει','τρώμε','τρώτε','τρώνε'] },
        { inf: 'ακούω', en: 'to hear / to listen',
          note: "Source of 'acoustic', 'acoustics'. 3pl: ακούν (no final -ε).",
          forms: ['ακούω','ακούς','ακούει','ακούμε','ακούτε','ακούν'] },
        { inf: 'πάω', en: 'to go',
          note: "Irregular but follows the λέω skeleton. 'Πάμε!' = 'Let's go!'",
          forms: ['πάω','πας','πάει','πάμε','πάτε','πάνε'] },
        { inf: 'κλαίω', en: 'to cry',
          note: "Stress on the αί diphthong. εσύ form drops the vowel: κλαις.",
          forms: ['κλαίω','κλαις','κλαίει','κλαίμε','κλαίτε','κλαίνε'] },
        { inf: 'φταίω', en: "to be at fault / to be to blame",
          note: "'Εγώ φταίω' = 'It's my fault.' Same skeleton as κλαίω.",
          forms: ['φταίω','φταις','φταίει','φταίμε','φταίτε','φταίνε'] },
      ]
    },
    {
      group: '-ω',
      rule: '-ω group (unstressed): -ω, -εις, -ει, -ουμε, -ετε, -ουν · stress stays on the stem.',
      verbs: [
        { inf: 'αγοράζω', en: 'to buy',
          note: "From η αγορά (marketplace). Perfective: να αγοράσω.",
          forms: ['αγοράζω','αγοράζεις','αγοράζει','αγοράζουμε','αγοράζετε','αγοράζουν'] },
        { inf: 'γράφω', en: 'to write',
          note: "Source of 'graph', 'graphic', 'paragraph', 'autograph'.",
          forms: ['γράφω','γράφεις','γράφει','γράφουμε','γράφετε','γράφουν'] },
        { inf: 'διαβάζω', en: 'to read / to study',
          note: "διά (through) + βάζω (put). 'Put it through' — read/study.",
          forms: ['διαβάζω','διαβάζεις','διαβάζει','διαβάζουμε','διαβάζετε','διαβάζουν'] },
        { inf: 'θέλω', en: 'to want',
          note: "One of the 13 high-frequency irregulars. Aorist: θέλησα.",
          forms: ['θέλω','θέλεις','θέλει','θέλουμε','θέλετε','θέλουν'] },
        { inf: 'ξέρω', en: 'to know',
          note: "Mnemonic: 'X-ray vision = I see, I know'. No real aorist — use ήξερα.",
          forms: ['ξέρω','ξέρεις','ξέρει','ξέρουμε','ξέρετε','ξέρουν'] },
        { inf: 'πίνω', en: 'to drink',
          note: "Cognate with Latin 'potare' → English 'potion', 'potable'.",
          forms: ['πίνω','πίνεις','πίνει','πίνουμε','πίνετε','πίνουν'] },
        { inf: 'βλέπω', en: 'to see / to look',
          note: "Gives medical 'blepharitis' (eyelid inflammation).",
          forms: ['βλέπω','βλέπεις','βλέπει','βλέπουμε','βλέπετε','βλέπουν'] },
        { inf: 'κάνω', en: 'to do / to make',
          note: "After είμαι/έχω, the most-used verb in Greek. 'Τι κάνεις;' = 'How are you?'",
          forms: ['κάνω','κάνεις','κάνει','κάνουμε','κάνετε','κάνουν'] },
        { inf: 'παίρνω', en: 'to take / to get',
          note: "Mnemonic: 'I take a PEAR-no'. Aorist: πήρα (irregular).",
          forms: ['παίρνω','παίρνεις','παίρνει','παίρνουμε','παίρνετε','παίρνουν'] },
        { inf: 'δίνω', en: 'to give',
          note: "PIE root *deh₃- → also Latin 'do, donare' → English 'donate'.",
          forms: ['δίνω','δίνεις','δίνει','δίνουμε','δίνετε','δίνουν'] },
        { inf: 'γράφω', en: 'to write (dup placeholder)',
          note: '',
          forms: [] }, // sentinel — removed below
        { inf: 'έχω', en: 'to have',
          note: "Source of English 'epoch' (ἐπέχω, 'to hold'). The auxiliary verb in Greek.",
          forms: ['έχω','έχεις','έχει','έχουμε','έχετε','έχουν'] },
        { inf: 'ανοίγω', en: 'to open',
          note: "Mnemonic: 'a-NEE-go and the door opens'. Imperative: άνοιξε.",
          forms: ['ανοίγω','ανοίγεις','ανοίγει','ανοίγουμε','ανοίγετε','ανοίγουν'] },
        { inf: 'κλείνω', en: 'to close / to shut',
          note: "Imperative: κλείσε. Opposite of ανοίγω.",
          forms: ['κλείνω','κλείνεις','κλείνει','κλείνουμε','κλείνετε','κλείνουν'] },
        { inf: 'μένω', en: 'to stay / to live (somewhere)',
          note: "Cognate of Latin 'manere' → English 'remain', 'permanent'.",
          forms: ['μένω','μένεις','μένει','μένουμε','μένετε','μένουν'] },
      ].filter(v => v.forms && v.forms.length === 6)
    },
    {
      group: '-ώ',
      rule: '-ώ group (stressed): -ώ, -είς, -εί, -ούμε, -είτε, -ούν · stress on the ending throughout.',
      verbs: [
        { inf: 'μπορώ', en: 'can / to be able',
          note: "Stress lives on the ending. 'Μπορείς;' = 'Can you?' Aorist: μπόρεσα.",
          forms: ['μπορώ','μπορείς','μπορεί','μπορούμε','μπορείτε','μπορούν'] },
        { inf: 'οδηγώ', en: 'to drive',
          note: "From η οδός (road) — same root as 'odyssey'. 'Road-do' = drive.",
          forms: ['οδηγώ','οδηγείς','οδηγεί','οδηγούμε','οδηγείτε','οδηγούν'] },
        { inf: 'τηλεφωνώ', en: 'to telephone / to call',
          note: "Direct cognate: tele- (far) + phone (voice). Easy win.",
          forms: ['τηλεφωνώ','τηλεφωνείς','τηλεφωνεί','τηλεφωνούμε','τηλεφωνείτε','τηλεφωνούν'] },
        { inf: 'ευχαριστώ', en: 'to thank',
          note: "Source of 'Eucharist' (Christian thanksgiving). Lit: 'good favor'.",
          forms: ['ευχαριστώ','ευχαριστείς','ευχαριστεί','ευχαριστούμε','ευχαριστείτε','ευχαριστούν'] },
        { inf: 'χρησιμοποιώ', en: 'to use',
          note: "χρήσιμο (useful) + ποιώ (make) → 'make useful' = use.",
          forms: ['χρησιμοποιώ','χρησιμοποιείς','χρησιμοποιεί','χρησιμοποιούμε','χρησιμοποιείτε','χρησιμοποιούν'] },
        { inf: 'ακολουθώ', en: 'to follow',
          note: "Source of English 'acolyte' (one who follows / assists).",
          forms: ['ακολουθώ','ακολουθείς','ακολουθεί','ακολουθούμε','ακολουθείτε','ακολουθούν'] },
        { inf: 'ζω', en: 'to live',
          note: "Source of 'zoology', 'zodiac'. Short stem ζ-, standard -ώ endings.",
          forms: ['ζω','ζεις','ζει','ζούμε','ζείτε','ζουν'] },
        { inf: 'αργώ', en: 'to be late / to be slow',
          note: "From αργός (slow, lazy). Gives 'argon' (the slow, inert gas).",
          forms: ['αργώ','αργείς','αργεί','αργούμε','αργείτε','αργούν'] },
        { inf: 'τραγουδώ', en: 'to sing',
          note: "Noun: το τραγούδι (song). 'Tra-goo-DO' has a song in it.",
          forms: ['τραγουδώ','τραγουδείς','τραγουδεί','τραγουδούμε','τραγουδείτε','τραγουδούν'] },
        { inf: 'προσπαθώ', en: 'to try / to attempt',
          note: "προς + πάθος (toward + passion) — 'push toward'. Aorist: προσπάθησα.",
          forms: ['προσπαθώ','προσπαθείς','προσπαθεί','προσπαθούμε','προσπαθείτε','προσπαθούν'] },
      ]
    },
  ];

  // ---- Build the flat card deck for drilling ----
  function buildDeck(groupFilter) {
    const cards = [];
    for (const g of GROUPS) {
      if (groupFilter !== 'all' && g.group !== groupFilter) continue;
      for (const v of g.verbs) {
        for (let i = 0; i < PRONOUNS.length; i++) {
          cards.push({
            group: g.group,
            infinitive: v.inf,
            infinitive_en: v.en,
            note: v.note,
            pron: PRONOUNS[i].pron,
            pron_en: PRONOUNS[i].en,
            answer: v.forms[i],
          });
        }
      }
    }
    return shuffle(cards);
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Normalize Greek for forgiving comparison: lowercase, strip diacritics, final-ς == σ.
  function norm(s) {
    return s
      .toLowerCase()
      .normalize('NFD')
      .replace(/[̀-ͯ]/g, '')
      .replace(/[ςσ]/g, 'σ')
      .replace(/\s+/g, '')
      .trim();
  }

  // Escape HTML to keep notes safe when injected into feedback.
  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // ---- State ----
  let deck = [];
  let pos = 0;
  let correct = 0;
  let wrong = 0;
  let streak = 0;
  let currentGroup = 'all';
  let answered = false;

  // ---- DOM ----
  const el = (id) => document.getElementById(id);
  const inputEl = el('input');
  const submitBtn = el('submit-btn');
  const skipBtn = el('skip-btn');
  const revealBtn = el('reveal-btn');
  const restartBtn = el('restart-btn');
  const feedbackEl = el('feedback');
  const cardEl = el('card');
  const emptyEl = el('empty-state');

  // ---- Render ----
  function renderCard() {
    if (pos >= deck.length) {
      cardEl.style.display = 'none';
      emptyEl.style.display = '';
      renderStats();
      return;
    }
    cardEl.style.display = '';
    emptyEl.style.display = 'none';
    const c = deck[pos];
    el('meta-group').textContent = c.group;
    el('meta-label').textContent = 'verb';
    el('infinitive').textContent = c.infinitive;
    el('infinitive-en').textContent = c.infinitive_en;
    el('prompt-pron').textContent = c.pron;
    el('prompt-en').textContent = c.pron_en;
    inputEl.value = '';
    inputEl.classList.remove('correct', 'wrong');
    inputEl.disabled = false;
    feedbackEl.style.display = 'none';
    feedbackEl.innerHTML = '';
    submitBtn.textContent = 'Check ✓';
    submitBtn.disabled = false;
    revealBtn.disabled = false;
    answered = false;
    inputEl.focus();
    renderStats();
  }

  function renderStats() {
    el('stat-pos').textContent = Math.min(pos + 1, deck.length);
    el('stat-total').textContent = deck.length;
    el('stat-correct').textContent = correct;
    el('stat-wrong').textContent = wrong;
    el('stat-streak').textContent = streak;
  }

  function renderRule() {
    const ruleEl = el('rule-text');
    if (currentGroup === 'all') {
      ruleEl.textContent = 'All four groups mixed. Click a group above to focus on one pattern.';
    } else {
      const g = GROUPS.find(g => g.group === currentGroup);
      ruleEl.textContent = g ? g.rule : '';
    }
  }

  // Build the reference tables block from GROUPS, so adding verbs only requires
  // editing the data array above.
  function renderTables() {
    const host = el('table-body');
    host.innerHTML = '';
    for (const g of GROUPS) {
      const block = document.createElement('div');
      block.className = 'group-block';
      block.innerHTML = `
        <h3>${esc(g.group)} group</h3>
        <div class="group-rule">${esc(g.rule)}</div>
      `;
      for (const v of g.verbs) {
        const rows = PRONOUNS.map((p, i) =>
          `<tr><th>${esc(p.pron)}</th><td>${esc(v.forms[i])}</td></tr>`
        ).join('');
        const tbl = document.createElement('table');
        tbl.className = 'conj-table';
        tbl.innerHTML = `
          <caption>
            ${esc(v.inf)} <span class="meaning">— ${esc(v.en)}</span>
            ${v.note ? `<span class="verb-note">${esc(v.note)}</span>` : ''}
          </caption>
          <tbody>${rows}</tbody>
        `;
        block.appendChild(tbl);
      }
      host.appendChild(block);
    }
  }

  // ---- Actions ----
  function buildFeedback(label, klass, answer, note) {
    const noteBlock = note
      ? `<div class="note-line"><strong>💡 Memory hook:</strong> ${esc(note)}</div>`
      : '';
    return `<div>${label}</div><div class="answer-line">${esc(answer)}</div>${noteBlock}`;
  }

  function grade() {
    if (answered) { next(); return; }
    const c = deck[pos];
    const guess = inputEl.value.trim();
    if (!guess) return;
    const isCorrect = norm(guess) === norm(c.answer);
    answered = true;
    if (isCorrect) {
      correct++;
      streak++;
      inputEl.classList.add('correct');
      feedbackEl.className = 'feedback ok';
      feedbackEl.innerHTML = buildFeedback('✓ Correct!', 'ok', c.answer, c.note);
    } else {
      wrong++;
      streak = 0;
      inputEl.classList.add('wrong');
      feedbackEl.className = 'feedback no';
      feedbackEl.innerHTML = buildFeedback('✗ Answer:', 'no', c.answer, c.note);
    }
    feedbackEl.style.display = '';
    submitBtn.textContent = 'Next →';
    renderStats();
  }

  function next() { pos++; renderCard(); }

  function skip() {
    if (!answered) { wrong++; streak = 0; }
    pos++;
    renderCard();
  }

  function reveal() {
    if (answered) return;
    const c = deck[pos];
    inputEl.value = c.answer;
    inputEl.classList.add('wrong');
    feedbackEl.className = 'feedback no';
    feedbackEl.innerHTML = buildFeedback('Answer:', 'no', c.answer, c.note);
    feedbackEl.style.display = '';
    answered = true;
    wrong++;
    streak = 0;
    submitBtn.textContent = 'Next →';
    renderStats();
  }

  function restart() {
    deck = buildDeck(currentGroup);
    pos = 0;
    correct = 0;
    wrong = 0;
    streak = 0;
    renderCard();
  }

  function setGroup(g) {
    currentGroup = g;
    document.querySelectorAll('.group-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.group === g);
    });
    renderRule();
    restart();
  }

  // ---- Events ----
  submitBtn.addEventListener('click', grade);
  skipBtn.addEventListener('click', skip);
  revealBtn.addEventListener('click', reveal);
  restartBtn.addEventListener('click', restart);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); grade(); }
  });
  document.querySelectorAll('.group-btn').forEach(b => {
    b.addEventListener('click', () => setGroup(b.dataset.group));
  });
  el('table-toggle').addEventListener('click', () => {
    const body = el('table-body');
    const open = body.classList.toggle('open');
    el('table-toggle').textContent = open ? 'Hide full conjugation tables ▴' : 'Show full conjugation tables ▾';
  });

  // ---- Init ----
  renderRule();
  renderTables();
  restart();
</script>
</body>
</html>
